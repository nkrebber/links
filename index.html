const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decryptAndShow(pw){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(DATA.salt), iterations:DATA.iter, hash:"SHA-256"},
    baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(DATA.iv)}, key, b64(DATA.ct));
  const html = new TextDecoder().decode(ptBuf);
  try { sessionStorage.setItem("links_pw", pw); } catch(e){}
  document.open(); document.write(html); document.close();
}

const form = document.getElementById("gate");
const err  = document.getElementById("err");
const go   = document.getElementById("go");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  err.textContent = ""; go.disabled = true; go.textContent = "Entschlüssele…";
  try {
    await decryptAndShow(document.getElementById("pw").value);
  } catch(_) {
    err.textContent = "Falsches Passwort.";
    go.disabled = false; go.textContent = "Öffnen";
  }
});
// Automatisch entsperren, wenn in dieser Sitzung schon eingegeben
(async () => {
  try {
    const saved = sessionStorage.getItem("links_pw");
    if (saved) await decryptAndShow(saved);
  } catch(_){ try{ sessionStorage.removeItem("links_pw"); }catch(e){} }
})();
</script>
